name: Go

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22.x", "stable"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Format
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -count=1 ./...
      - name: Race test
        run: go test -race -count=1 ./...
      - name: Generate coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        run: go test -count=1 -covermode=atomic -coverprofile=coverage.out .
      - name: Upload coverage
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          fail_ci_if_error: true
          use_oidc: true
